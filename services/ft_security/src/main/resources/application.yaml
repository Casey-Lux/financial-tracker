server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ft_security

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USER:ft_user}
    password: ${DB_PASSWORD:simplepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    net.ft.financialtracker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info