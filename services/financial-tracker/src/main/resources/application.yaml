server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: financial-tracker

  security:
    ft:
      public-key-url: http://localhost:8082/api/v1/.well-known/public-key

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financial_tracker}
    username: ${DB_USER:ft_user}
    password: ${DB_PASSWORD:simplepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    net.ft.financialtracker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info